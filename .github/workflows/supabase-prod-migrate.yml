# Apply supabase/migrations to production (schema only). Run manually after reviewing PRs.
#
# Secrets required:
#   SUPABASE_ACCESS_TOKEN   — from https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD    — Database password (Project Settings → Database)
#
# Variables (repo Settings → Variables → Actions) OR hardcode ref in this file:
#   SUPABASE_PRODUCTION_PROJECT_REF — e.g. abcdefghijklmnop from project URL

name: Migrate production DB

on:
  workflow_dispatch:

concurrency:
  group: supabase-prod-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PRODUCTION_PROJECT_REF: ${{ vars.SUPABASE_PRODUCTION_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link and push migrations
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "Set secrets SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD"
            exit 1
          fi
          if [ -z "$SUPABASE_PRODUCTION_PROJECT_REF" ]; then
            echo "Set Actions variable SUPABASE_PRODUCTION_PROJECT_REF to your production project ref"
            exit 1
          fi
          supabase link --project-ref "$SUPABASE_PRODUCTION_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db push --yes
