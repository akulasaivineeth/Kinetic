<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800;1,900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #F4F5F3; min-height: 100vh; overscroll-behavior: none;

  ::-webkit-scrollbar { width: 0; height: 0; }

    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 12px; gap: 24px; flex-wrap: wrap;
  }
  .hint {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(11,13,12,0.85); color: #fff;
    font-size: 11px; padding: 6px 12px; border-radius: 99px;
    letter-spacing: 0.6px; font-weight: 600; z-index: 99;
    backdrop-filter: blur(6px); text-transform: uppercase;
  }
</style>
</head>

// Avatar (user photo placeholder with initials on colored bg, or image url)
function KAvatar({ name = '?', size = 44, color, src, ring, style = {} }) {
  const initials = name.split(' ').map(s => s[0]).join('').slice(0,2).toUpperCase();
  const bg = color || (() => {
    // deterministic color from name
    const palette = ['#6B7FD8','#E07A5F','#7FB069','#D4A373','#9D4EDD','#F4A261','#2A9D8F','#E76F51'];
    let h = 0; for (let i=0;i<name.length;i++) h = (h*31 + name.charCodeAt(i)) % palette.length;
    return palette[h];
  })();
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: src ? `url(${src}) center/cover` : bg,
      border: ring ? `3px solid ${ring}` : 'none',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: K.font.ui, fontWeight: 700, fontSize: size * 0.36,

// Thin progress ring — for weekly goal etc.
function KRing({ pct = 0.5, size = 110, stroke = 10, color = K.green, track = '#E4E6E4', children }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - Math.min(1, Math.max(0, pct)));
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} stroke={track} strokeWidth={stroke} fill="none"/>
        <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none"
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off}
          transform={`rotate(-90 ${size/2} ${size/2})`}
          style={{ transition: 'stroke-dashoffset 0.8s cubic-bezier(.2,.8,.2,1)' }}/>
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {children}
      </div>
    </div>
  );
}

  // active exercises — user's chosen ones to track (default 4 + allow adding from library)

function LogRow({ active, onChange, onRemove }) {

// ─── Score reveal ─────────────────────────────────────────────
function ScoreReveal({ points, onDone }) {
  const [stage, setStage] = React.useState(0); // 0 intro, 1 count, 2 rank, 3 done
  const [shown, setShown] = React.useState(0);

  React.useEffect(() => {
    const t1 = setTimeout(() => setStage(1), 400);
    const t2 = setTimeout(() => {
      let start = performance.now();
      const dur = 1400;
      const tick = (t) => {
        const p = Math.min(1, (t - start) / dur);
        const eased = 1 - Math.pow(1 - p, 3);
        setShown(Math.round(points * eased));
        if (p < 1) requestAnimationFrame(tick);
        else setStage(2);
      };
      requestAnimationFrame(tick);
    }, 500);
    const t3 = setTimeout(() => setStage(3), 3200);
    return () => [t1, t2, t3].forEach(clearTimeout);
  }, []);

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 100,
      background: 'linear-gradient(180deg, #0E1A14 0%, #0B0D0C 100%)',
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      padding: 30, color: '#fff',
      animation: 'fadeIn 0.3s ease',
    }}>
      <style>{`
        @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
        @keyframes burstIn { from { opacity: 0; transform: scale(0.3) rotate(-20deg) } to { opacity: 1; transform: scale(1) rotate(0) } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }
        @keyframes pulse { 0%,100% { transform: scale(1) } 50% { transform: scale(1.04) } }
      `}</style>

      {/* Rays background */}
      <div style={{
        position: 'absolute', inset: 0,
        background: `radial-gradient(circle at 50% 50%, ${K.green}22 0%, transparent 55%)`,
        pointerEvents: 'none',
      }}/>

      {/* Eyebrow */}
      <div style={{
        fontFamily: K.font.ui, fontSize: 11, fontWeight: 700,
        letterSpacing: 3, textTransform: 'uppercase',
        color: K.green, marginBottom: 14,
        animation: 'slideUp 0.5s ease both',
      }}>Session Complete</div>

      {/* Big count */}
      <div style={{
        fontFamily: K.font.display, fontWeight: 900, fontStyle: 'italic',
        fontSize: 108, color: '#fff', letterSpacing: -3, lineHeight: 1,
        animation: stage >= 1 ? 'burstIn 0.6s cubic-bezier(.2,1.4,.3,1) both' : 'none',
        textShadow: `0 0 40px ${K.green}88`,
      }}>{shown}</div>
      <div style={{
        fontFamily: K.font.ui, fontSize: 14, fontWeight: 700, color: K.green,
        letterSpacing: 4, textTransform: 'uppercase', marginTop: 6,
      }}>POINTS EARNED</div>

      {/* Rank change */}
      {stage >= 2 && (
        <div style={{
          marginTop: 40, display: 'flex', gap: 20,
          animation: 'slideUp 0.5s ease both',
        }}>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.5)', fontWeight: 700, letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 6 }}>Rank</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontFamily: K.font.display, fontWeight: 900, fontStyle: 'italic', fontSize: 32, color: 'rgba(255,255,255,0.4)', letterSpacing: -1 }}>#4</span>
              <span style={{ color: K.green, fontSize: 22 }}>→</span>
              <span style={{ fontFamily: K.font.display, fontWeight: 900, fontStyle: 'italic', fontSize: 40, color: K.green, letterSpacing: -1 }}>#3</span>
            </div>
          </div>
          <div style={{ width: 1, background: 'rgba(255,255,255,0.15)' }}/>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.5)', fontWeight: 700, letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 6 }}>Streak</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, justifyContent: 'center' }}>

            </div>
          </div>
        </div>
      )}

      {stage >= 3 && (
        <div style={{
          position: 'absolute', bottom: 40, left: 30, right: 30,
          animation: 'slideUp 0.5s ease both',
        }}>
          <button onClick={onDone} style={{

function pickerBtn(active, flex) {

// ─── Exercise vote / consensus flow ────────────────────────────
function KineticVote({ onBack, onDone }) {
  // 3 stages: 1 "my picks" → 2 consensus view → 3 locked
  const [stage, setStage] = React.useState(1);
  const [picks, setPicks] = React.useState(new Set(['pushup','squat','run','plank']));
  const maxPicks = 6;

  const toggle = (id) => {
    const next = new Set(picks);
    if (next.has(id)) next.delete(id);
    else if (next.size < maxPicks) next.add(id);
    setPicks(next);
  };

  return (
    <div style={{ padding: '0 20px 160px', fontFamily: K.font.ui }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
        <button onClick={onBack} style={{
          width: 36, height: 36, borderRadius: K.r.pill, border: 'none', background: K.card,
          boxShadow: K.shadow.card, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
        }}>
          <Ic.Back size={18} color={K.ink}/>
        </button>
        <div>
          <KEyebrow>Monsters · vote {stage}/3</KEyebrow>
          <KDisplay size={26} style={{ marginTop: 2 }}>
            {stage === 1 ? 'YOUR PICKS' : stage === 2 ? 'CONSENSUS' : 'LOCKED IN'}
          </KDisplay>
        </div>
      </div>

      {/* progress dots */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 22 }}>
        {[1,2,3].map(s => (
          <div key={s} style={{
            flex: 1, height: 4, borderRadius: 2,
            background: s <= stage ? K.green : K.lineStrong,
            transition: 'background 0.3s',
          }}/>
        ))}
      </div>

      {stage === 1 && <VoteStage1 picks={picks} toggle={toggle} maxPicks={maxPicks} onNext={() => setStage(2)}/>}
      {stage === 2 && <VoteStage2 myPicks={picks} onNext={() => setStage(3)}/>}
      {stage === 3 && <VoteStage3 onDone={onDone}/>}
    </div>
  );
}

  );
}

                  <Ic.Check size={12} color="#fff"/>

        boxShadow: K.shadow.fab,
      }}>
        LOCK IN LINEUP
      </button>
    </div>
  );
}

        <div style={{ height: 6, borderRadius: 3, background: '#EFEFEF', overflow: 'hidden' }}>

            width: `${tier.pct * 100}%`, height: '100%',
            background: `linear-gradient(90deg, ${tier.color}, ${tier.next?.color || tier.color})`,
            borderRadius: 3,
          }}/>
        </div>
      </KCard>

      {/* Settings list */}
      <div style={{ marginTop: 26 }}>
        <KEyebrow>Settings</KEyebrow>
        <div style={{ marginTop: 10, display: 'flex', flexDirection: 'column', gap: 2 }}>
          <Row icon={<Ic.Target size={16} color={K.greenDeep}/>} label="Performance goals" detail="4 active"/>
          <Row icon={<Ic.Squads size={16} color={K.greenDeep}/>} label="Sharing" detail="3 active"/>
          <Row icon={<Ic.Calendar size={16} color={K.greenDeep}/>} label="Weekly reset" detail="Mon 00:00"/>
          <Row icon={<Ic.Bell size={16} color={K.greenDeep}/>} label="Notifications" detail="On"/>
        </div>
      </div>

      <div style={{ marginTop: 26 }}>
        <KEyebrow>Integrations</KEyebrow>
        <div style={{ marginTop: 10 }}>
          <Row icon={<Ic.Pulse size={16} color={K.greenDeep}/>} label="Apple Health" detail="Connected" last/>
        </div>
      </div>

      <div style={{ marginTop: 26, textAlign: 'center', fontSize: 10, color: K.mutedSoft, letterSpacing: 1, fontWeight: 700 }}>
        KINETIC · v4.2.0 · BUILD 2026
      </div>
    </div>
  );
}

function Stat({ label, value, icon, color }) {
  return (
    <div>
      <div style={{ fontSize: 9, color: K.muted, fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase' }}>{label}</div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 3, marginTop: 2 }}>
        {icon}
        <span style={{
          fontFamily: K.font.display, fontStyle: 'italic', fontWeight: 900, fontSize: 16,
          color: color || K.ink, letterSpacing: -0.3,
        }}>{value}</span>
      </div>
    </div>
  );
}

function Row({ icon, label, detail, last }) {
  return (
    <div style={{
      background: K.card, borderRadius: K.r.md, padding: '12px 14px',
      boxShadow: K.shadow.card, display: 'flex', alignItems: 'center', gap: 12,
      cursor: 'pointer', marginBottom: 8,
    }}>
      <div style={{
        width: 34, height: 34, borderRadius: 9, background: K.mintSoft,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>{icon}</div>
      <div style={{ flex: 1, fontSize: 14, fontWeight: 600, color: K.ink }}>{label}</div>
      <div style={{ fontSize: 12, color: K.muted, fontWeight: 600 }}>{detail}</div>
      <Ic.Chevron size={12} color={K.mutedSoft}/>
    </div>
  );
}

Object.assign(window, { KineticProfile });

})();

// ===== app.jsx =====
(function(){
// Main app shell — routes, phone frame, tab bar

const { K, Ic, KHeader, KStatusBar, KTabBar } = window;

function KineticApp() {
  const [route, setRoute] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('kinetic_route')) || { screen: 'pulse' }; }
    catch { return { screen: 'pulse' }; }
  });
  React.useEffect(() => { localStorage.setItem('kinetic_route', JSON.stringify(route)); }, [route]);

  const go = (r) => setRoute(r);

  // determine active tab for tab bar highlight
  const tab = route.screen === 'pulse' ? 'pulse'
    : route.screen === 'profile' ? 'profile'
    : route.screen === 'log' ? 'log'
    : ['squads','squad','create','vote'].includes(route.screen) ? 'squads'
    : 'pulse';

  const showHeader = ['pulse','profile','squads'].includes(route.screen);
  const showTabBar = !['create','vote'].includes(route.screen);

  return (
    <div data-screen-label={'Kinetic — ' + route.screen} style={{
      position: 'relative', width: '100%', height: '100%',
      background: K.bg, overflow: 'hidden', fontFamily: K.font.ui,
      color: K.ink,
    }}>
      {/* safe-area status bar (fake, underneath phone frame we already have device bezel) */}
      <KStatusBar time="8:33"/>

      {showHeader && (
        <KHeader
          rank="#4"
          notifCount={2}
          onNotifs={() => {}}
        />
      )}

      {/* Scroll area */}
      <div style={{
        position: 'absolute',
        top: showHeader ? 100 : 48, left: 0, right: 0, bottom: 0,
        overflowY: 'auto', overflowX: 'hidden',
        WebkitOverflowScrolling: 'touch',
      }}>
        {route.screen === 'pulse' && (
          <KineticPulse
            onSubmit={() => go({ screen: 'log' })}
            onOpenExercise={() => {}}
          />
        )}
        {route.screen === 'log' && (
          <KineticLog
            onBack={() => go({ screen: 'pulse' })}
            onSubmit={() => go({ screen: 'squads' })}
          />
        )}
        {route.screen === 'squads' && (
          <KineticSquads
            onOpenSquad={(s) => go({ screen: 'squad', squad: s.id })}
            onCreate={() => go({ screen: 'create' })}
            onJoin={() => {}}
          />
        )}
        {route.screen === 'squad' && (
          <KineticSquadDetail
            squad={SQUADS.find(s => s.id === route.squad) || SQUADS[0]}
            onBack={() => go({ screen: 'squads' })}
            onStartVote={() => go({ screen: 'vote' })}
          />
        )}
        {route.screen === 'create' && (
          <KineticCreateSquad
            onBack={() => go({ screen: 'squads' })}
            onCreated={() => go({ screen: 'squads' })}
          />
        )}
        {route.screen === 'vote' && (
          <KineticVote
            onBack={() => go({ screen: 'squad', squad: 'monsters' })}
            onDone={() => go({ screen: 'squad', squad: 'monsters' })}
          />
        )}
        {route.screen === 'profile' && (
          <KineticProfile onOpenTier={() => {}}/>
        )}
      </div>

      {showTabBar && (
        <KTabBar active={tab} onChange={(t) => {
          if (t === 'log') go({ screen: 'log' });
          else if (t === 'pulse') go({ screen: 'pulse' });
          else if (t === 'squads') go({ screen: 'squads' });
          else if (t === 'profile') go({ screen: 'profile' });
        }}/>
      )}
    </div>
  );
}

Object.assign(window, { KineticApp });

})();

</script>

<script type="text/babel" data-presets="react">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<KineticApp/>);
</script>

<div class="hint">Pulse · Squads · Log · Profile — tap tabs to explore</div>
</body>
</html>
